root_model_name: EconAgent_D1
requirements:
  general: |
    ### General Implementation Requirements
    1. Language & Environment:
    - Target Language: Python 3.10+
    - Standard Libraries: `argparse`, `sys`, `json`, `logging`, `collections`, `random`, `math`, `asyncio`, `xdevs`.
    - LLM SDK: `from openai import AsyncOpenAI`
    - The generated simulator should be executable via `python run.py`.

    2. Input Interface (Arguments):
    - Use argparse to parse simulation settings.
    - Recommended args: `--num_agents`, `--months`, `--seed`, `--simulate_time`, `--api_model`.

    3. Output Interface:
    - stdout MUST emit JSONL event traces.
    - Each JSON object MUST include at least:
      `{"time": <float>, "model": <str>, "event": <str>, "data": <dict>}`.
    - All non-trace diagnostic logs should go to stderr.

    4. Time Unit:
    - One simulation step is one month.
    - 12 months = 1 year.

  scenario: |
    ### Scenario: EconAgent Macroeconomic Simulation

    #### Entities (DEVS Models)
    - Household (Atomic): LLM-driven decision agent. Outputs monthly work and consumption propensity.
    - Government (Atomic): Collects income tax by progressive tax schedule, then redistributes evenly.
    - Bank (Atomic): Updates annual interest rate using the Taylor Rule.
    - Market (Atomic): Applies labor/consumption dynamics and updates goods inventory/price.
    - EconSystem (Coupled): Top-level coupled model wiring Household, Government, Bank, Market.

    #### Hard Rules (must be explicit deterministic logic)
    1. Government Tax + Redistribution:
      - Progressive tax by bracket/rate list.
      - For income z_i, tax T(z_i) is calculated bracket-wise.
      - Redistribution z_r equals average tax revenue across all households.
      - Post-tax income: z_i_hat = z_i - T(z_i) + z_r.
      - Savings update baseline: s_i <- s_i + z_i_hat.

    2. Market Inventory / Supply-Demand:
      - Working household contributes labor supply and goods production.
      - Inventory update: G <- G + sum(l_i * 168 * A), where A is productivity.
      - Intended demand: d_i = p_c_i * (s_i + income_i) / P in goods units.
      - Real demand is bounded by inventory: d_i_hat = min(d_i, G).
      - Inventory decreases by actual consumed goods.
      - Supply-demand imbalance drives wage and goods-price adjustment.

    3. Bank / Monetary Policy:
      - At first month of each year, update annual interest rate by Taylor Rule:
        r = max(r_n + pi_t + a_pi * (pi - pi_t) + a_u * (u_n - u), 0).
      - Interest accrual can be applied annually: s_i <- s_i * (1 + r).

    4. No-LLM Rules:
      - Tax/redistribution, Taylor-rate update, inventory update, inflation/unemployment bookkeeping
        MUST be deterministic code, not delegated to LLM.

    #### LLM Decision Prompt (Household behavior)
    - Household decisions MUST be generated by LLM (not hardcoded formula) for:
      1) work propensity in [0, 1]
      2) consumption propensity in [0, 1]
    - Prompt template should include household profile/state and market conditions:
      - age, job, expected monthly wage/income, previous consumption, tax paid, redistribution credit,
        current goods price, current savings, current interest rate, unemployment/inflation context.
    - Example role prompt (adapted from EconAgent appendix):
      "You're a 40-year-old individual. Last month income was {income}, savings is {savings},
      goods price is {price}. Considering living costs, future plans, and macro trends, output JSON:
      {'work': float in [0,1], 'consumption': float in [0,1]}."

    #### Mandatory LLM API Coding Requirements
    - Generated Household atomic code MUST include:
      - `import asyncio`
      - `from openai import AsyncOpenAI`
    - In behavior transition logic (`deltint` and/or `deltext`):
      - Build prompt from runtime state variables (savings, wage/income, goods price, etc.).
      - Call async API with structured output:
        `await client.chat.completions.create(..., response_format={"type":"json_object"})`
      - Parse JSON robustly and extract float `work` and `consumption`.
      - Write parsed values into internal state for later output/market updates.

  args_input_output: |
    ### Command Line Arguments
    - `--num_agents` (int): number of households. Default 100.
    - `--months` (int): simulation horizon in months. Default 240.
    - `--seed` (int): random seed. Default 42.
    - `--simulate_time` (float): DEVS runtime horizon. Default 240.0.
    - `--api_model` (str): model id for household calls. Default "gpt-4o-mini".
    - `--initial_price` (float): initial goods price.
    - `--initial_rate` (float): initial annual interest rate.

    ### Output JSONL Events (minimum required)
    - Household:
      - `{"event":"household_decision", "data":{"id":int,"work":float,"consumption":float,...}}`
    - Government:
      - `{"event":"tax_redistribution", "data":{"total_tax":float,"redistribution":float,...}}`
    - Market:
      - `{"event":"market_update", "data":{"price":float,"inventory":float,"demand":float,...}}`
    - Bank:
      - `{"event":"interest_update", "data":{"rate":float,"inflation":float,"unemployment":float}}`
    - Macro per month:
      - `{"event":"macro_snapshot", "data":{"month":int,"year":int,"price":float,"unemployment":float,"avg_wage":float}}`

base_folder: econagent_model
skip_simulation_check: false
only_ensure_executable: false
