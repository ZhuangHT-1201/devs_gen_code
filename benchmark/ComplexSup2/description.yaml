root_model_name: MultiProductSupplyChain
requirements:
    general: |
        ### General Implementation Requirements
        1. **Language & Environment**: Python 3.10+, using `simpy` and `numpy`.
        2. **Randomness Control**:
           - You MUST accept a `--seed` argument (int).
           - You MUST set `numpy.random.seed(args.seed)` and `random.seed(args.seed)` at the very beginning of execution.
        3. **Output Interface**:
           - Print simulation events to `sys.stdout` in **JSONL** format (one JSON object per line).
           - Do not print debugging info to stdout; use stderr for that.
        4. **Entry point**: executable via `python run.py --simulate_time <days> --seed <int>`.

    scenario: |
        ### Scenario: Multi-Product Bakery Supply Chain with Capacity Constraints & Demand Patterns

        #### 1. System Topology (5-tier, 14 nodes)
        * **Tier 0 (Raw Material Suppliers)**: `wheat_farm`, `sugar_mill`, `dairy_farm`. Infinite capacity, zero lead time to kitchen.
        * **Tier 1 (Central Kitchen)**: `kitchen`. Produces 3 products from raw materials. **Daily production capacity: 10 batches per day** (shared across all products). A "batch" is a production unit â€” each product has its own batch size (see BOM table below). The kitchen can produce up to 10 batches total per day, where each batch counts as 1 toward the daily limit regardless of product type.
        * **Tier 2 (Regional Warehouses)**: `wh_north`, `wh_south`. Store finished goods before distributing to stores.
        * **Tier 3 (Retail Stores)**: `A1`, `A2`, `B1`, `B2`, `C1`, `C2`. Face end-customer demand directly.

        #### 2. Products & BOM (Bill of Materials)
        | Product | Units per Batch | Flour per Batch | Sugar per Batch | Dairy per Batch | Prod Time | Shelf Life | Sell Price per Unit |
        |---------|----------------|-----------------|-----------------|-----------------|-----------|------------|---------------------|
        | Bread   | 100 units      | 20              | 5               | 0               | 0.5 day   | 3 days     | $2.00               |
        | Cake    | 50 units       | 10              | 15              | 10              | 1.0 day   | 5 days     | $8.00               |
        | Cookie  | 200 units      | 15              | 10              | 5               | 0.3 day   | 10 days    | $1.00               |

        **Raw material costs**: Flour $1.00/unit, Sugar $0.80/unit, Dairy $1.50/unit.

        **Production cost per batch** (IMPORTANT): For each batch produced, the cost equals the sum of (raw_material_units_per_batch Ă— raw_material_cost). This does NOT multiply by the batch size in units.
        - Bread: 20Ă—$1.00 + 5Ă—$0.80 + 0Ă—$1.50 = **$24.00 per batch**
        - Cake: 10Ă—$1.00 + 15Ă—$0.80 + 10Ă—$1.50 = **$37.00 per batch**
        - Cookie: 15Ă—$1.00 + 10Ă—$0.80 + 5Ă—$1.50 = **$30.50 per batch**

        #### 3. Node Configuration
        * **Kitchen**: Init inventory = {Bread: 0, Cake: 0, Cookie: 0}. Max 10 batches/day (any mix of products).
        * **Warehouses**:
          - `wh_north`: Cap 2000 units total. Init: {Bread: 100, Cake: 20, Cookie: 200}.
          - `wh_south`: Cap 1500 units total. Init: {Bread: 80, Cake: 15, Cookie: 150}.
        * **Stores** (each store has per-product capacity):
          | Store | Warehouse Source | Bread Cap | Cake Cap | Cookie Cap | Init Bread | Init Cake | Init Cookie |
          |-------|-----------------|-----------|----------|------------|------------|-----------|-------------|
          | A1    | wh_north        | 60        | 30       | 100        | 20         | 5         | 30          |
          | A2    | wh_north        | 80        | 40       | 120        | 30         | 8         | 40          |
          | B1    | wh_south        | 50        | 25       | 80         | 15         | 3         | 20          |
          | B2    | wh_south        | 70        | 35       | 100        | 25         | 6         | 30          |
          | C1    | wh_north        | 40        | 20       | 60         | 10         | 2         | 15          |
          | C2    | wh_south        | 60        | 30       | 90         | 20         | 5         | 25          |

        #### 4. Daily Operation Timeline (IMPORTANT: this is the order of events each day)

        Each day proceeds in the following **logical order**:

        **(a) Start of day (t = day + 0.0)**:
        1. **Receive shipments** that have arrived (in-transit goods whose lead time has elapsed). Add to inventory.
        2. **Check for expired inventory** at all nodes (warehouses + stores). Remove expired items, record waste cost.
        3. **Store replenishment**: Each store checks its inventory position (on_hand only, not in-transit) against its (s, S) policy per product. If on_hand â‰¤ s, place an order to its source warehouse for quantity (S - on_hand), capped by warehouse availability and store capacity. The warehouse immediately deducts the ordered quantity from its on-hand inventory. The order is shipped and will arrive at the store after the store's lead time.

        **(b) During the day (t = day + 0.0 ~ 1.0)**:
        4. **Customer demand arrives** at each store. The number of demand events per store per day follows a Poisson distribution. Each demand event randomly selects a product and quantity. The store fulfills from its on-hand inventory (FIFO by expiry). Unfulfilled demand is recorded as a lost sale.

        **(c) End of day (t = day + 1.0)**:
        5. **Kitchen production check**: The kitchen checks the total on-hand inventory across both warehouses for each product. If a product's total warehouse on-hand is below its reorder threshold, the kitchen produces batches to bring it toward the target level, subject to the daily 10-batch capacity limit. Produced goods are shipped to warehouses (split roughly equally) and arrive after the respective lead times.
        6. **Holding cost**: Accumulate holding cost for the day. For each node (warehouses + stores) and each product, add `on_hand Ă— $0.05` to the daily holding cost. This is computed once per day, using the on-hand inventory at the end of the day (after demand has been processed but before the next day's shipments arrive).

        #### 5. Replenishment Policies
        * **Kitchen Production** (end of day):
          - Check total warehouse on-hand (sum of wh_north + wh_south) per product.
          - Thresholds: Bread < 100, Cake < 20, Cookie < 150.
          - Target: Bread â†’ 200, Cake â†’ 40, Cookie â†’ 300.
          - Deficit = target - current_on_hand. Allocate the 10 daily batches proportionally to each product's deficit (floor division, then distribute remainder to products with largest remaining deficit).
          - Only produce if deficit > 0.
        * **Store Replenishment** (start of day, (s, S) policy per product):
          | Store | Product | s   | S   |
          |-------|---------|-----|-----|
          | A1    | Bread   | 15  | 40  |
          | A1    | Cake    | 3   | 15  |
          | A1    | Cookie  | 10  | 50  |
          | A2    | Bread   | 20  | 50  |
          | A2    | Cake    | 5   | 20  |
          | A2    | Cookie  | 15  | 60  |
          | B1    | Bread   | 10  | 30  |
          | B1    | Cake    | 2   | 10  |
          | B1    | Cookie  | 8   | 40  |
          | B2    | Bread   | 15  | 40  |
          | B2    | Cake    | 4   | 18  |
          | B2    | Cookie  | 12  | 50  |
          | C1    | Bread   | 8   | 25  |
          | C1    | Cake    | 2   | 10  |
          | C1    | Cookie  | 6   | 30  |
          | C2    | Bread   | 12  | 35  |
          | C2    | Cake    | 3   | 15  |
          | C2    | Cookie  | 10  | 45  |

        #### 6. Logistics (Lead Times)
        * Kitchen â†’ wh_north: 0.5 days, Kitchen â†’ wh_south: 0.8 days
        * wh_north â†’ A1/A2/C1: 0.3 days, wh_south â†’ B1/B2/C2: 0.4 days
        * Transport costs: $2.0 per shipment (fixed) + $0.01 per unit.

        #### 7. Demand Model (Stochastic with Day-of-Week Pattern)
        * **Weekday (Mon-Fri, day % 7 in 0..4)**: Poisson arrival Î»=3/day per store, quantity Uniform[1,4] (integer).
        * **Weekend (Sat-Sun, day % 7 in 5..6)**: Poisson arrival Î»=6/day per store, quantity Uniform[2,8] (integer).
        * **Simulation starts on Monday (day 0 = Monday)**. Day 0 is a weekday.
        * **Product mix per demand event**: Bread 50%, Cake 20%, Cookie 30%.
        * **Within-day timing**: Demand events are spread uniformly within the day (each event's time = day + uniform(0, 1)).
        * **Unfulfilled demand**: Lost sales (no backorder). Record as `lost_sale` event.

        #### 8. Financial Logic
        * **Revenue**: Recorded at point of sale (fulfilled demand). `revenue = quantity_fulfilled Ă— sell_price`.
        * **Production cost**: Recorded when production starts. For each batch produced, cost = sum of (raw_material_units_per_batch Ă— raw_material_cost) as shown in the BOM table above. Example: producing 3 batches of Bread costs 3 Ă— $24.00 = $72.00. Total production cost = sum over all batches produced.
        * **Transport cost**: Recorded when a replenishment order is placed. `cost = $2.0 + $0.01 Ă— quantity`.
        * **Holding cost**: Accumulated once per day at end-of-day. `cost = on_hand Ă— $0.05` per product per node.
        * **Waste cost**: Recorded when inventory expires. `cost = expired_qty Ă— sell_price Ă— 0.5`.
        * **Total profit** = total_revenue - (production_cost + transport_cost + holding_cost + waste_cost).

    args_input_output: |
        ### Arguments & Input/Output Specifications

        #### 1. CLI Arguments
        * `--simulate_time` (int): Duration of simulation in days.
        * `--seed` (int): Random seed for reproducibility.

        #### 2. Standard Output (JSONL)
        * **Format:** One JSON object per line on stdout.
        * **Mandatory:** Print a `sim_trace` event exactly once at the end with final KPIs.

        #### 3. Event JSON Schemas

        **Global Fields:**
        | Field | Type | Description |
        | :--- | :--- | :--- |
        | `time` | `float` | Simulation timestamp in days. |
        | `event` | `string` | Event type identifier. |
        | `node_id`| `string` | The ID of the entity. |
        | `payload` | `object` | Event-specific data. |

        ---

        **Event A: Demand Arrival** (Stores only)
        * **`event`**: `"demand_arrival"`
        * **`payload`**:
          * `product` (str): "bread", "cake", or "cookie"
          * `quantity_requested` (int)
          * `quantity_fulfilled` (int)
          * `revenue` (float)

        **Event B: Lost Sale** (Stores only, when demand cannot be fully fulfilled)
        * **`event`**: `"lost_sale"`
        * **`payload`**:
          * `product` (str)
          * `quantity_lost` (int)

        **Event C: Replenishment Order** (Stores â†’ Warehouses)
        * **`event`**: `"replenishment_order"`
        * **`payload`**:
          * `product` (str)
          * `quantity` (int)
          * `source_id` (str): e.g., "wh_north", "wh_south"
          * `order_cost` (float): transport cost for this order

        **Event D: Shipment Received** (Stores receiving from warehouses, warehouses receiving from kitchen)
        * **`event`**: `"shipment_received"`
        * **`payload`**:
          * `product` (str)
          * `quantity` (int)
          * `source_id` (str): origin of the shipment

        **Event E: Production Start** (Kitchen only)
        * **`event`**: `"production_start"`
        * **`payload`**:
          * `product` (str)
          * `batch_size` (int): number of units produced in this production run (= units_per_batch from BOM table Ă— number_of_batches)
          * `raw_materials` (dict): {"flour": int, "sugar": int, "dairy": int} â€” total raw materials consumed for this production run

        **Event F: Inventory Expired**
        * **`event`**: `"inventory_expired"`
        * **`payload`**:
          * `product` (str)
          * `quantity` (int)
          * `waste_cost` (float)
          * `node_id` (str): which node the expiry occurred at

        **Event G: Daily Snapshot** (End of each day, one per store)
        * **`event`**: `"snapshot"`
        * **`payload`**:
          * `on_hand` (dict): {"bread": int, "cake": int, "cookie": int}

        **Event H: Final Simulation Trace** (End of run, node_id="System")
        * **`event`**: `"sim_trace"`
        * **`payload`**:
          * `total_revenue` (float)
          * `total_cost` (float): sum of production + transport + holding + waste costs
          * `total_profit` (float): revenue - total_cost
          * `total_demand` (int): total quantity requested across all stores/products
          * `total_fulfilled` (int): total quantity actually sold
          * `total_lost_sales` (int): total quantity not fulfilled
          * `service_level` (float): fulfilled / demand
          * `total_waste` (int): total expired quantity
          * `total_production_batches` (int): total count of batches produced at kitchen across the entire simulation. This is the number of batch production events, NOT the total units produced. Example: if the kitchen produces 3 batches of Bread and 2 batches of Cake, total_production_batches = 5.

        #### 4. Consistency Requirements
        * `total_demand == total_fulfilled + total_lost_sales`
        * `total_profit == total_revenue - total_cost` (within floating point tolerance of 1.0)
        * `service_level == total_fulfilled / total_demand` (if demand > 0)

